name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src/ tests/

  docs_path_lint:
    name: Docs Path Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run docs/path lint
        run: python -m src.cli.run_docs_path_lint --output artifacts/qa/docs_path_lint.json

      - name: Upload docs/path lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-path-lint-report
          path: artifacts/qa/docs_path_lint.json
          if-no-files-found: error

  deterministic_rerun:
    name: Deterministic Rerun
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run deterministic rerun validation
        run: python -m src.cli.run_deterministic_rerun_validation --output artifacts/qa/deterministic_rerun.json

      - name: Upload deterministic rerun report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-rerun-report
          path: artifacts/qa/deterministic_rerun.json
          if-no-files-found: error

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q
