name: Milestone Validation

on:
  workflow_dispatch:
  push:
    branches:
      - "milestone/**"
      - "m22/**"
  pull_request:
    branches:
      - main

jobs:
  milestone_validation:
    name: Milestone Validation Bundle
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'milestone/') || startsWith(github.head_ref, 'm22/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run milestone validation bundle
        run: python -m src.cli.run_milestone_validation --bundle-dir artifacts/qa/milestone_validation_bundle --include-full-pytest

      - name: Upload milestone validation bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-validation-bundle
          path: artifacts/qa/milestone_validation_bundle
          if-no-files-found: error
