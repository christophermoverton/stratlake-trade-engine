research_campaign:
  dataset_selection:
    dataset:
    timeframe:
    evaluation_horizon:
    mapping_name:
    tickers_path:

  time_windows:
    start:
    end:
    train_start:
    train_end:
    predict_start:
    predict_end:

  targets:
    alpha_names: []
    strategy_names: []
    portfolio_names: []
    alpha_catalog_path: configs/alphas.yml
    strategy_config_path: configs/strategies.yml
    portfolio_config_path: configs/portfolios.yml

  reuse_policy:
    enable_checkpoint_reuse: true
    reuse_prior_stages:
      - preflight
      - research
      - comparison
      - candidate_selection
      - portfolio
      - candidate_review
      - review
    force_rerun_stages: []
    invalidate_downstream_after_stages: []

  comparison:
    enabled: false
    from_registry: true
    top_k:
    alpha_view: combined
    alpha_metric: ic_ir
    alpha_sleeve_metric: sharpe_ratio
    strategy_metric: sharpe_ratio

  candidate_selection:
    enabled: false
    artifacts_root: artifacts/alpha
    alpha_name:
    dataset:
    timeframe:
    evaluation_horizon:
    mapping_name:
    metric: ic_ir
    max_candidates:
    eligibility:
      min_mean_ic:
      min_mean_rank_ic:
      min_ic_ir:
      min_rank_ic_ir:
      min_history_length:
      min_coverage:
    redundancy:
      max_pairwise_correlation:
      min_overlap_observations:
    allocation:
      allocation_method: equal_weight
      max_weight_per_candidate:
      min_allocation_candidate_count:
      min_allocation_weight:
      allocation_weight_sum_tolerance: 1.0e-12
      allocation_rounding_decimals: 12
    execution:
      strict_mode: false
      skip_eligibility: false
      skip_redundancy: false
      skip_allocation: false
      enable_review: false
      no_markdown_review: false
      register_run: false
      from_registry: false
    output:
      path: artifacts/candidate_selection
      registry_path:
      review_output_path:

  portfolio:
    enabled: false
    portfolio_name:
    timeframe:
    from_registry: false
    from_candidate_selection: false
    evaluation_path:
    optimizer_method:

  review:
    filters:
      run_types:
        - alpha_evaluation
        - strategy
        - portfolio
      timeframe:
      dataset:
      alpha_name:
      strategy_name:
      portfolio_name:
      top_k_per_type:
    ranking:
      alpha_evaluation_primary_metric: ic_ir
      alpha_evaluation_secondary_metric: mean_ic
      strategy_primary_metric: sharpe_ratio
      strategy_secondary_metric: total_return
      portfolio_primary_metric: sharpe_ratio
      portfolio_secondary_metric: total_return
    output:
      path:
      emit_plots: true

  milestone_reporting:
    enabled: true
    decision_categories: []
    output:
      include_markdown_report: true
      decision_log_render_formats:
        - markdown
        - text
    sections:
      campaign_scope: true
      selections: true
      key_findings: true
      key_metrics: true
      gate_outcomes: true
      risks: true
      next_steps: true
      open_questions: true
      decision_snapshot: true
      related_artifacts: true
    summary:
      include_stage_counts: true
      include_review_outcome: true

  outputs:
    alpha_artifacts_root: artifacts/alpha
    candidate_selection_output_path: artifacts/candidate_selection
    candidate_selection_registry_path:
    campaign_artifacts_root: artifacts/research_campaigns
    portfolio_artifacts_root: artifacts/portfolios
    comparison_output_path:
    review_output_path:
