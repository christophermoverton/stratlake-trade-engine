robustness:
  strategy_name: cross_section_momentum
  sweep:
    strategy:
      name: [cross_section_momentum]
      params:
        lookback_days: [1, 5]
    signal:
      type: [cross_section_rank, binary_signal]
      params:
        quantile: [0.2]
    constructor:
      name: [rank_dollar_neutral, identity_weights]
    asymmetry:
      exclude_short: [false, true]
    group_by: [strategy.name, signal.type, constructor.name]
  stability:
    mode: subperiods
    periods: 4
  ranking:
    primary_metric: sharpe_ratio
    tie_breakers: [total_return, max_drawdown]
  statistical_controls:
    deflated_sharpe_ratio: true
    multiple_testing_awareness: true
    primary_metric: sharpe_ratio
    validity_ranking_method: adjusted_q_value
    fdr_alpha: 0.10
    min_splits_for_inference: 4
    low_neighbor_gap_threshold: 0.05
    low_threshold_pass_rate_threshold: 0.50
    rank_instability_correlation_threshold: 0.50
    dsr_min_observations: 20
    overfitting_warning_search_space: 100
